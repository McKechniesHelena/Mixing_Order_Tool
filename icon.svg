<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- variant B: white circle badge with green number inside each droplet -->
  <path d="M22 8 c -6 8 -10 14 -10 19 a10 10 0 0 0 20 0 c 0 -5 -4 -11 -10 -19 z"
        fill="#2e7d32" opacity=".88"/>
  <path d="M42 8 c -6 8 -10 14 -10 19 a10 10 0 0 0 20 0 c 0 -5 -4 -11 -10 -19 z"
        fill="#43a047" opacity=".88"/>
  <path d="M32 28 c -6 8 -10 14 -10 19 a10 10 0 0 0 20 0 c 0 -5 -4 -11 -10 -19 z"
        fill="#1b5e20" opacity=".96"/>
  <circle cx="22" cy="29" r="6.5" fill="#fff"/>
  <circle cx="42" cy="29" r="6.5" fill="#fff"/>
  <circle cx="32" cy="49" r="6.5" fill="#fff"/>
  <!-- numerals: y is the ALPHABETIC baseline (circle-center + ~0.36*font-size),
       not `dominant-baseline="central"` — Mobile Safari and several Android
       browsers ignore central baseline and render high. Setting y to the
       alphabetic baseline directly is reliable across all engines. -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif"
     font-weight="800" fill="#1b5e20" text-anchor="middle">
    <text x="22" y="32.7" font-size="10">1</text>
    <text x="42" y="32.7" font-size="10">2</text>
    <text x="32" y="52.7" font-size="10">3</text>
  </g>
</svg>
